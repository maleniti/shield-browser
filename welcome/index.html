<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Welcome!</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Referenced by the .group/.todo-section/.menu-dropdown/.modal panels'
       backdrop-filter (style.css), chained with a small blur() there -- pure
       distortion here (feTurbulence + feDisplacementMap warps the backdrop
       like uneven glass) rather than uniformly smearing it, with just a
       touch of blur layered on top in CSS for a softer edge. -->
  <svg width="0" height="0" style="position: absolute">
    <filter id="glass-distort" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012 0.018" numOctaves="2" seed="4" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="12" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </svg>
  <div id="bg-layer"><div id="bg-image"></div></div>

  <button id="exit-edit-mode-btn" title="Exit edit mode (Esc)">
    <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M9 16.2L4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4z"/></svg>
  </button>
  <button id="menu-btn" title="Menu">&#9776;</button>
  <div id="menu-dropdown" class="menu-dropdown hidden">
    <label class="menu-item">
      <span>Edit mode</span>
      <span class="switch">
        <input type="checkbox" id="edit-mode-toggle">
        <span class="switch-track"></span>
      </span>
    </label>

    <div class="menu-divider"></div>

    <div class="menu-label">Search engine</div>
    <div class="menu-row">
      <select id="search-engine-select" class="modal-input"></select>
    </div>

    <div class="menu-divider"></div>

    <div class="menu-label">Background image</div>
    <div class="menu-row">
      <input type="text" id="bg-url-input" class="modal-input" placeholder="Image URL">
      <button id="bg-url-apply" class="menu-btn-small">Set</button>
    </div>
    <button id="bg-file-btn" class="menu-btn-small menu-btn-wide">Choose file&hellip;</button>
    <input type="file" id="bg-file-input" accept="image/*" hidden>

    <div class="menu-row menu-opacity-row">
      <span>Opacity</span>
      <input type="range" id="bg-opacity" min="0" max="100" value="30">
    </div>

    <button id="bg-remove-btn" class="menu-btn-small menu-btn-wide">Remove background</button>
    <div id="bg-error" class="bg-error"></div>

    <div class="menu-divider"></div>

    <button id="site-lists-manage-btn" class="menu-btn-small menu-btn-wide">Site whitelist / blacklist&hellip;</button>

    <div class="menu-divider"></div>

    <button id="todo-manage-btn" class="menu-btn-small menu-btn-wide">To-do list&hellip;</button>
  </div>

  <main>
    <form id="search-form" action="https://duckduckgo.com/" method="GET">
      <input id="search-input" name="q" type="text" placeholder="Search DuckDuckGo" autofocus autocomplete="off">
      <button type="submit">Search</button>
    </form>

    <button id="groups-scroll-up" class="groups-scroll-btn" title="Previous row">&#8963;</button>
    <div id="groups-viewport">
      <div id="groups"></div>
    </div>
    <button id="groups-scroll-down" class="groups-scroll-btn" title="Next row">&#8964;</button>

    <button id="add-group-btn" class="edit-only accent-btn">+ Add group</button>

    <div id="todo-section" class="todo-section hidden">
      <button id="todo-scroll-up" class="groups-scroll-btn" title="Previous task">&#8963;</button>
      <div id="todo-viewport">
        <div id="todo-list"></div>
      </div>
      <button id="todo-scroll-down" class="groups-scroll-btn" title="Next task">&#8964;</button>
    </div>
  </main>

  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-title"></div>
      <div class="modal-fields"></div>
      <div class="modal-actions">
        <button class="modal-cancel">Cancel</button>
        <button class="modal-ok">OK</button>
      </div>
    </div>
  </div>

  <div id="todo-manage-overlay" class="modal-overlay hidden">
    <div class="modal todo-manage-modal">
      <div class="modal-title">To-do list</div>
      <div id="todo-manage-list"></div>
      <button id="todo-add-btn" class="menu-btn-small">+ Add task</button>
      <div class="modal-actions">
        <button id="todo-manage-close" class="modal-cancel">Close</button>
      </div>
    </div>
  </div>

  <div id="site-lists-overlay" class="modal-overlay hidden">
    <div class="modal site-lists-modal">
      <div class="modal-title">Site whitelist &amp; blacklist</div>
      <div class="site-lists-columns">
        <div class="site-lists-column">
          <div class="menu-label">Whitelist</div>
          <div id="whitelist-list" class="site-list"></div>
          <button id="whitelist-add-btn" class="menu-btn-small menu-btn-wide">+ Add</button>
        </div>
        <div class="site-lists-column">
          <div class="menu-label">Blacklist</div>
          <div id="blacklist-list" class="site-list"></div>
          <button id="blacklist-add-btn" class="menu-btn-small menu-btn-wide">+ Add</button>
        </div>
      </div>
      <div class="modal-actions">
        <button id="site-lists-close" class="modal-cancel">Close</button>
      </div>
    </div>
  </div>

  <script src="recurrence.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
